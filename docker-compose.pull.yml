# Nutzt das fertig gebaute Image aus der Registry (kein Build nötig)
# Verwendung: docker compose -f docker-compose.pull.yml --env-file .env.docker up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanban_board
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban_board"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: ghcr.io/leifsanden/kanban-board:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kanban:${DB_PASSWORD}@db:5432/kanban_board
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
