# Standalone-Deployment: alles-in-einem Container + Watchtower für automatische Updates
#
# Start:  docker compose -f docker-compose.standalone.yml up -d
#
# GHCR-Authentifizierung (nötig wenn das Image privat ist):
#   Erstelle eine .env.standalone Datei mit:
#   GHCR_USER=sandenleif
#   GHCR_TOKEN=<GitHub Personal Access Token mit read:packages>
#   WATCHTOWER_TOKEN=<eigenes Geheimnis, beliebig wählbar>
#
# Danach: docker compose -f docker-compose.standalone.yml --env-file .env.standalone up -d

services:
  kanban:
    image: ghcr.io/sandenleif/kanban-board:standalone
    container_name: kanban-board-standalone
    restart: unless-stopped
    volumes:
      - kanban_standalone_data:/data
    ports:
      - "${PORT:-5005}:3000"
    environment:
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN:-kanban-update-secret}
      - WATCHTOWER_URL=http://watchtower:8080
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - watchtower

  watchtower:
    image: containrrr/watchtower:latest
    container_name: kanban-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mountet Docker-Credentials vom Host → Watchtower kann private GHCR-Images ziehen
      - ${DOCKER_CONFIG:-~/.docker}/config.json:/config.json:ro
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-kanban-update-secret}
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - DOCKER_CONFIG=/
      - DOCKER_API_VERSION=1.41
      # Optionale GHCR-Credentials (Alternative zu docker login auf dem Host)
      - REPO_USER=${GHCR_USER:-}
      - REPO_PASS=${GHCR_TOKEN:-}
    # KEIN --no-pull: Watchtower muss das neue Image ziehen können
    # Kein --schedule: läuft nur auf HTTP-Anfrage (kein automatischer Poll)
    command: --http-api-update
    expose:
      - "8080"

volumes:
  kanban_standalone_data:
    external: true
