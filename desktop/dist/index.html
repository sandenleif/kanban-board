<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanbanFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .wrap { width: 100%; max-width: 380px; padding: 2rem; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo svg { display: block; margin: 0 auto 0.875rem; }
    .logo h1 { font-size: 1.625rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo p { color: #64748b; font-size: 0.875rem; margin-top: 0.375rem; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }
    label { display: block; font-size: 0.8125rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.5rem; }
    input[type="url"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
      user-select: text;
      -webkit-user-select: text;
    }
    input[type="url"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    input[type="url"]::placeholder { color: #475569; }
    .error { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.625rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover { background: #2563eb; }
    button:active { opacity: 0.85; }
    .hint { text-align: center; margin-top: 1.25rem; font-size: 0.775rem; color: #475569; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="13" fill="#3b82f6"/>
        <path d="M17 13H22V24L31 13H37L27 25.5L37 39H31L22 28V39H17V13Z" fill="white"/>
      </svg>
      <h1>KanbanFlow</h1>
      <p>Enter your server address to connect</p>
    </div>
    <div class="card">
      <label for="url">Server URL</label>
      <input
        type="url"
        id="url"
        placeholder="https://your-server.com"
        autocomplete="url"
        spellcheck="false"
      />
      <div class="error" id="error"></div>
      <button id="btn" onclick="connect()">Connect</button>
    </div>
    <p class="hint">The URL is saved locally — you only need to enter it once.</p>
  </div>

  <script>
    const input = document.getElementById('url');
    const errorEl = document.getElementById('error');

    const saved = localStorage.getItem('kanbanflow_server');
    if (saved) {
      window.location.href = saved;
    }

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });

    function connect() {
      const raw = input.value.trim();
      errorEl.textContent = '';

      if (!raw) {
        errorEl.textContent = 'Please enter a server URL.';
        return;
      }

      let url;
      try {
        url = new URL(raw.startsWith('http') ? raw : 'https://' + raw);
        if (!['http:', 'https:'].includes(url.protocol)) throw new Error();
      } catch {
        errorEl.textContent = 'Invalid URL — use http:// or https://';
        return;
      }

      localStorage.setItem('kanbanflow_server', url.href);
      window.location.href = url.href;
    }
  </script>
</body>
</html>
